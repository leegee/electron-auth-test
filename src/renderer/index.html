<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src 'self';
    style-src 'self';
    img-src 'self';
    connect-src https://github.com https://api.github.com;
    frame-src https://github.com;
    form-action https://github.com;
    base-uri 'self';
  ">
  <title>Electron GitHub OAuth</title>
  <link rel="stylesheet" href="./index.css">
</head>

<body>
  <h1>Electron GitHub OAuth</h1>
  <button id="login">Login with GitHub</button>
  <p id="status"></p>

  <button id="set">Set Secret</button>
  <button id="get">Get Secret</button>

  <script type="module" src="./index.ts"></script>

</body>

</html>
